name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Check code quality ──────────────────
  check-code:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/

  # ── JOB 2: Build Docker image ──────────────────
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: check-code                    # Runs only if Job 1 passes
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:latest

  # ── JOB 3: Fake Deploy to Railway ────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Simulate Railway Deployment
      run: |
        echo "Connecting to Railway..."
        sleep 2

        echo "Pulling latest Docker image..."
        sleep 2

        echo "Deploying Flask application to Railway..."
        sleep 2

        echo "Application successfully deployed!"
        echo "Live URL: https://my-flask-app.up.railway.app"

        echo "Deployment completed at $(date)"