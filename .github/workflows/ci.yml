name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Check code quality ──────────────────
  check-code:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Check code style (lint)
        run: flake8 .

      - name: Run tests
        run: pytest tests/

  # ── JOB 2: Build Docker image ──────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: check-code
    if: github.event_name == 'push'

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t flask-ci-demo .

  # ── JOB 3: Fake Deploy to Railway ────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Simulate Railway Deployment
        run: |
          echo "Connecting to Railway..."
          sleep 2

          echo "Pulling latest Docker image..."
          sleep 2

          echo "Deploying Flask application to Railway..."
          sleep 2

          echo "Application successfully deployed!"
          echo "Live URL: https://my-flask-app.up.railway.app"

          echo "Deployment completed at $(date)"